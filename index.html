<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIN - Gesture Game</title>
    <link rel="icon" type="image/png" href="/favicon_JIN.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="camera-background">
            <video id="video" class="camera-background-feed" autoplay playsinline muted></video>
        </div>
        <canvas id="landmarks" class="landmark-canvas"></canvas>
        <img src="public/assets/umain_logotype_black.png" alt="logotype" class="img-logo" style="top: 20px; right: 20px; max-width: 20vw; max-height: 10vh;">
        <img src="public/assets/arrow_down_JIN.png" alt="logotype" class="img-logo" style="top: 20px; left: 20px;">
        <img src="public/assets/arrow_up_JIN.png" alt="logotype" class="img-logo" style="bottom: 20px; right: 20px;">
        <!-- Single-player overlays (default) -->
        <div class="game-overlay" id="overlay"></div>
        <div class="game-overlay" id="particles"></div>
        <!-- Per-player overlays — shown only in multiplayer mode -->
        <div id="overlay-p1"></div>
        <div id="particles-p1"></div>
        <div id="overlay-p2"></div>
        <div id="particles-p2"></div>
        <!-- Time bar -->
        <div class="timebar" id="timebar">
            <div class="timebar__fill" id="timebar-fill"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
