<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIN - Gesture Game</title>
    <link rel="icon" type="image/png" href="/favicon_JIN.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            color: rgba(255, 255, 255, 0.87);
            background-color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }

        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .camera-background {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: #000;
        }

        .camera-background-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: scaleX(-1);
            filter: grayscale(100%) contrast(150%);
        }

        .game-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .scene-text {
            margin: 0;
            font-family: Arial Black, Arial, sans-serif;
            color: #fff;
            text-align: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-shadow: 0 2px 8px #000, 0 0 2px #000;
        }

        .scene-text--main-menu {
            font-size: clamp(28px, 3.5vw, 52px);
            top: 60%;
            line-height: 1.4;
        }

        .scene-text--onboarding {
            font-size: clamp(32px, 4vw, 64px);
            top: 20%;
            line-height: 1.3;
        }

        .scene-text--onboarding-title {
            font-size: clamp(40px, 6vw, 80px);
            top: 50%;
            transform: translate(-50%, -50%);
            transition: top 0.6s ease-out, transform 0.6s ease-out, font-size 0.6s ease-out;
            white-space: nowrap;
        }

        .scene-text--onboarding-title.onboarding-title--up {
            font-size: clamp(28px, 3.5vw, 52px);
            top: 8%;
            transform: translateX(-50%);
        }

        .progress-bar {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(280px, 50vw, 640px);
            height: 24px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .progress-bar__fill {
            height: 100%;
            background: linear-gradient(90deg, #7b00ff, #b44fff);
            box-shadow: 0 0 16px #b44fff;
            border-radius: 12px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scene-text--countdown {
            font-size: clamp(100px, 18vw, 220px);
            top: 60%;
            transform: translate(-50%, -50%);
            color: #b44fff;
            text-shadow: 0 0 40px #b44fff, 0 2px 8px #000;
            animation: countdownPulse 1s ease-in-out forwards;
        }

        .scene-text--countdown-label {
            font-size: clamp(36px, 5vw, 72px);
            top: 25%;
        }

        @keyframes countdownPulse {
            0%   { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
            40%  { opacity: 1; }
            70%  { transform: translate(-50%, -50%) scale(0.95); }
            85%  { transform: translate(-50%, -50%) scale(1.08); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .scene-text--between-title {
            font-size: clamp(36px, 5.5vw, 72px);
            top: 40%;
        }

        .scene-text--between-score {
            font-size: clamp(24px, 3vw, 40px);
            top: 53%;
        }

        .scene-text--game-gesture {
            font-size: clamp(20px, 2.5vw, 30px);
            top: 15%;
        }

        .scene-text--game-score {
            font-size: clamp(28px, 4vw, 52px);
            top: 4%;
            left: auto;
            right: 5%;
            transform: none;
            text-align: right;
            font-family: 'Courier New', monospace;
            color: #b44fff;
            text-shadow: 0 0 16px #b44fff, 0 2px 8px #000;
            animation: scorePop 0.2s ease-out;
        }

        @keyframes scorePop {
            0%   { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .timebar {
            position: absolute;
            right: 2%;
            top: 15%;
            bottom: 5%;
            width: 18px;
            background: rgba(20, 0, 40, 0.85);
            border: 2px solid #b44fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 16px #b44fff88;
            z-index: 2;
            display: none;
        }

        .timebar.active {
            display: block;
        }

        .timebar__fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, #7b00ff, #b44fff);
            box-shadow: 0 0 12px #b44fff;
            border-radius: 8px;
            transition: height 0.1s linear;
            height: 100%;
        }

        .scene-text--game-over {
            font-size: clamp(48px, 7vw, 80px);
            top: 15%;
        }

        .scene-text--game-over-hint {
            font-size: clamp(20px, 2.5vw, 30px);
            top: 30%;
        }

        .scene-text--game-time-countdown {
            font-size: clamp(64px, 10vw, 120px);
            top: 50%;
            transform: translate(-50%, -50%);
            animation: countdownPulse 1s ease-in-out infinite;
        }

        .scene-text--scoreboard {
            top: 50%;
            transform: translate(-50%, -50%);
            -webkit-text-stroke: 0;
        }

        .scoreboard {
            font-family: 'Courier New', monospace;
            background: rgba(20, 0, 40, 0.92);
            border: 3px solid #b44fff;
            padding: 16px 32px;
            min-width: 320px;
            text-align: center;
            box-shadow: 0 0 24px #b44fff88;
        }

        .scoreboard__title {
            font-size: clamp(18px, 2.5vw, 28px);
            letter-spacing: 6px;
            color: #b44fff;
            -webkit-text-stroke: 0;
            text-shadow: 0 0 10px #b44fff;
            margin-bottom: 8px;
        }

        .scoreboard__divider {
            border-top: 2px solid #b44fff66;
            margin: 8px 0;
        }

        .scoreboard__row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: clamp(14px, 2vw, 22px);
            padding: 4px 0;
            color: #b44fff;
            -webkit-text-stroke: 0;
            text-shadow: 0 0 8px #b44fff;
        }

        .scoreboard__row--highlight {
            color: #fff;
            text-shadow: 0 1px 4px #000;
        }

        .scoreboard__rank {
            width: 48px;
            text-align: left;
        }

        .scoreboard__dots {
            flex: 1;
            border-bottom: 2px dotted rgba(180,79,255,0.4);
            margin: 0 12px;
            margin-bottom: 4px;
        }

        .scoreboard__score {
            width: 64px;
            text-align: right;
        }

        .scene-text--game-start {
            font-size: clamp(48px, 7vw, 80px);
            top: 50%;
            transform: translate(-50%, -50%);
            animation: gameStart var(--duration) ease-in-out forwards;
        }

        @keyframes gameStart {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .main-menu-logo {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 40vw;
            max-height: 30vh;
            object-fit: contain;
            pointer-events: none;
        }

        .peace-target {
            position: absolute;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.7;
        }

        .peace-target--active {
            opacity: 1;
            animation: wiggle 2s ease-in-out infinite;
        }

        .peace-target--faded {
            opacity: 0.4;
        }

        .peace-target--done {
            opacity: 1;
        }

        @keyframes wiggle {
            0%, 100% { transform: translate(-50%, -50%) rotate(-6deg); }
            25% { transform: translate(-50%, -50%) scale(1.30); }
            50% { transform: translate(-50%, -50%) rotate(6deg); }
            75% { transform: translate(-50%, -50%) scale(1.30); }
        }

        .star {
            position: absolute;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: starFade var(--duration) ease-in-out forwards;
        }

        @keyframes starFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(5); }
        }

        .landmark-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .score-icons {
            position: absolute;
            bottom: 4%;
            left: 120px;
            right: 120px;
            display: flex;
            flex-direction: row;
            gap: 6px;
            align-items: center;
            flex-wrap: nowrap;
        }

        .score-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px #b44fff);
            animation: iconPop 0.3s ease-out;
        }

        @keyframes iconPop {
            0%   { transform: scale(0); opacity: 0; }
            70%  { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .score-number {
            position: absolute;
            bottom: 4%;
            right: 120px;
            font-family: 'Courier New', monospace;
            font-size: clamp(28px, 4vw, 52px);
            color: #b44fff;
            text-shadow: 0 0 16px #b44fff, 0 2px 8px #000;
            font-weight: bold;
        }

        .hint-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            vertical-align: middle;
            display: inline-block;
        }

        .corner-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            pointer-events: none;
        }

        /* ── Multiplayer overlays ──────────────────────────────────────────── */

        /* Hidden until .multiplayer is added to #app */
        #overlay-p1, #particles-p1,
        #overlay-p2, #particles-p2,
        #shared-overlay {
            display: none;
        }

        /* Player overlays are full-size positioned layers, just like #overlay.
           Content inside them is positioned at screen-absolute coordinates that
           naturally fall within the correct half — no clipping needed. */
        #overlay-p1, #particles-p1,
        #overlay-p2, #particles-p2 {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* When multiplayer is active, hide the single-player divs and
           reveal the per-player and shared ones */
        .multiplayer #particles {
            display: none;
        }

        .multiplayer #overlay-p1,
        .multiplayer #particles-p1,
        .multiplayer #overlay-p2,
        .multiplayer #particles-p2,
        .multiplayer #overlay {
            display: block;
        }

        /* Re-centre scene-text to each player's screen half */
        .multiplayer #overlay-p1 .scene-text,
        .multiplayer #particles-p1 .scene-text {
            left: 25%;
        }

        .multiplayer #overlay-p2 .scene-text,
        .multiplayer #particles-p2 .scene-text {
            left: 75%;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="camera-background">
            <video id="video" class="camera-background-feed" autoplay playsinline muted></video>
        </div>
        <canvas id="landmarks" class="landmark-canvas"></canvas>
        <!-- Single-player overlays (default) -->
        <div class="game-overlay" id="overlay"></div>
        <div class="game-overlay" id="particles"></div>
        <!-- Per-player overlays — shown only in multiplayer mode -->
        <div id="overlay-p1"></div>
        <div id="particles-p1"></div>
        <div id="overlay-p2"></div>
        <div id="particles-p2"></div>
        <!-- Time bar -->
        <div class="timebar" id="timebar">
            <div class="timebar__fill" id="timebar-fill"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
